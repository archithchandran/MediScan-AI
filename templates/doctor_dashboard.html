<!DOCTYPE html>
<html>
<head>
<title>Doctor Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
<h2>Doctor Dashboard</h2>
<a href="/doctor_logout">Logout</a>
</div>

<h2>Appointments</h2>

<table>
<tr>
<th>ID</th>
<th>User ID</th>
<th>Doctor</th>
<th>Date</th>
</tr>

{% for a in appointments %}
<tr>
{% for col in a %}
<td>{{ col }}</td>
{% endfor %}
</tr>
{% endfor %}
</table>

</body>
</html>
