<!DOCTYPE html>
<html>
<head>
<title>MediScan AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #1f2a38, #4facfe);
    color: white;
    text-align: center;
    margin: 0;
}

.hero {
    padding: 100px 20px;
}

.hero h1 {
    font-size: 50px;
}

.hero p {
    font-size: 20px;
    width: 60%;
    margin: auto;
}

.buttons {
    margin-top: 30px;
}

.buttons a {
    text-decoration: none;
}

.buttons button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    background-color: white;
    color: #1f2a38;
    cursor: pointer;
}

.buttons button:hover {
    background-color: #ddd;
}

.map-section {
    background: white;
    color: black;
    padding: 40px;
}

.footer {
    padding: 20px;
    background: rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<div class="hero">
<h1>MediScan AI</h1>
<p>
AI Powered Smart Healthcare Analysis System that predicts health risks,
generates reports, tracks health history, connects patients with doctors,
and provides AI health assistance.
</p>

<div class="buttons">
    <a href="/login"><button>User Login</button></a>
    <a href="/register"><button>User Register</button></a>
</div>

<div class="map-section">
<h2>Nearby Hospitals</h2>

<iframe
    width="80%"
    height="400"
    style="border:0"
    loading="lazy"
    allowfullscreen
    src="https://maps.google.com/maps?q=hospitals&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

<div class="footer">
<p>© 2026 MediScan AI | Smart Healthcare Analysis System</p>
</div>

</body>
</html>
